<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#17c3de" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#17c3de" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boxfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17c3de" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#17c3de" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- resplandor de piso -->
  <ellipse cx="480" cy="412" rx="440" ry="34" fill="url(#glow)"/>

  <!-- línea de piso -->
  <line x1="16" y1="412" x2="944" y2="412" stroke="#3fd9f0" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="14 10"/>

  <!-- dashes de movimiento -->
  <g stroke="#7ee6f4" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round">
    <line x1="4" y1="200" x2="44" y2="200"/>
    <line x1="14" y1="248" x2="40" y2="248"/>
    <line x1="0" y1="296" x2="34" y2="296"/>
  </g>

  <!-- caja del trailer -->
  <rect x="60" y="118" width="560" height="222" rx="10" fill="url(#boxfill)" stroke="#3fd9f0" stroke-width="2.5"/>
  <!-- costillas de panel -->
  <g stroke="#3fd9f0" stroke-opacity="0.16" stroke-width="2">
    <line x1="240" y1="128" x2="240" y2="330"/>
    <line x1="320" y1="128" x2="320" y2="330"/>
    <line x1="400" y1="128" x2="400" y2="330"/>
    <line x1="480" y1="128" x2="480" y2="330"/>
    <line x1="560" y1="128" x2="560" y2="330"/>
  </g>
  <!-- escarcha esquina superior -->
  <g stroke="#7ee6f4" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round">
    <line x1="78" y1="146" x2="102" y2="122"/>
    <line x1="90" y1="164" x2="126" y2="128"/>
    <line x1="104" y1="180" x2="150" y2="134"/>
  </g>

  <!-- copo de nieve central -->
  <g stroke="#7ee6f4" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round" transform="translate(390 228)">
    <line x1="0" y1="-44" x2="0" y2="44"/>
    <line x1="-38" y1="-22" x2="38" y2="22"/>
    <line x1="-38" y1="22" x2="38" y2="-22"/>
    <line x1="-8" y1="-32" x2="0" y2="-24"/><line x1="8" y1="-32" x2="0" y2="-24"/>
    <line x1="-8" y1="32" x2="0" y2="24"/><line x1="8" y1="32" x2="0" y2="24"/>
    <line x1="-32" y1="-10" x2="-22" y2="-12"/><line x1="-30" y1="-24" x2="-22" y2="-12"/>
    <line x1="32" y1="10" x2="22" y2="12"/><line x1="30" y1="24" x2="22" y2="12"/>
  </g>

  <!-- display de temperatura (abstracto) -->
  <g>
    <rect x="96" y="252" width="118" height="52" rx="8" stroke="#3fd9f0" stroke-opacity="0.7" stroke-width="2" fill="#060d16" fill-opacity="0.6"/>
    <line x1="112" y1="272" x2="152" y2="272" stroke="#3fd9f0" stroke-width="4" stroke-linecap="round"/>
    <line x1="112" y1="288" x2="176" y2="288" stroke="#3fd9f0" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round"/>
    <circle cx="196" cy="280" r="5" fill="#3fd9f0"/>
  </g>

  <!-- unidad de frío Thermo King (frontal del trailer) -->
  <rect x="612" y="134" width="42" height="98" rx="6" fill="#060d16" stroke="#3fd9f0" stroke-width="2.5"/>
  <g stroke="#3fd9f0" stroke-opacity="0.6" stroke-width="2">
    <line x1="620" y1="152" x2="646" y2="152"/>
    <line x1="620" y1="166" x2="646" y2="166"/>
    <line x1="620" y1="180" x2="646" y2="180"/>
    <line x1="620" y1="194" x2="646" y2="194"/>
    <line x1="620" y1="208" x2="646" y2="208"/>
  </g>
  <!-- aire frío saliendo -->
  <g stroke="#7ee6f4" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M658 156 q14 6 0 14"/>
    <path d="M664 184 q16 7 0 16"/>
    <path d="M658 216 q14 6 0 14"/>
  </g>

  <!-- chasis -->
  <rect x="620" y="340" width="256" height="14" fill="#060d16" stroke="#3fd9f0" stroke-opacity="0.7" stroke-width="2"/>
  <line x1="60" y1="354" x2="620" y2="354" stroke="#3fd9f0" stroke-opacity="0.5" stroke-width="2"/>
  <!-- estanque combustible -->
  <rect x="668" y="352" width="74" height="24" rx="12" stroke="#3fd9f0" stroke-opacity="0.6" stroke-width="2" fill="#060d16"/>

  <!-- cabina -->
  <path d="M645 340 V180 H722 V140 H800 L850 202 H878 Q896 202 896 220 V308 Q896 322 886 330 L872 340 Z"
        fill="url(#boxfill)" stroke="#3fd9f0" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- parabrisas -->
  <path d="M806 150 L844 198 H806 Z" fill="#17c3de" fill-opacity="0.18" stroke="#7ee6f4" stroke-opacity="0.8" stroke-width="2" stroke-linejoin="round"/>
  <!-- ventana lateral -->
  <rect x="742" y="152" width="48" height="40" rx="4" fill="#17c3de" fill-opacity="0.12" stroke="#7ee6f4" stroke-opacity="0.6" stroke-width="2"/>
  <!-- puerta -->
  <line x1="736" y1="200" x2="736" y2="332" stroke="#3fd9f0" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="748" cy="238" r="3" fill="#3fd9f0" fill-opacity="0.7"/>
  <!-- foco -->
  <rect x="884" y="252" width="12" height="18" rx="3" fill="#ffb02e" fill-opacity="0.85"/>

  <!-- ruedas trailer (duales traseras) -->
  <g stroke="#3fd9f0" stroke-width="2.5">
    <circle cx="128" cy="382" r="30" fill="#060d16"/>
    <circle cx="128" cy="382" r="12" stroke-opacity="0.6"/>
    <circle cx="196" cy="382" r="30" fill="#060d16"/>
    <circle cx="196" cy="382" r="12" stroke-opacity="0.6"/>
    <!-- ruedas cabina -->
    <circle cx="700" cy="382" r="30" fill="#060d16"/>
    <circle cx="700" cy="382" r="12" stroke-opacity="0.6"/>
    <circle cx="846" cy="382" r="30" fill="#060d16"/>
    <circle cx="846" cy="382" r="12" stroke-opacity="0.6"/>
  </g>

  <!-- copos flotando -->
  <g stroke="#7ee6f4" stroke-linecap="round">
    <g stroke-opacity="0.55" stroke-width="2" transform="translate(150 64)">
      <line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/>
      <line x1="-6" y1="-6" x2="6" y2="6"/><line x1="-6" y1="6" x2="6" y2="-6"/>
    </g>
    <g stroke-opacity="0.35" stroke-width="2" transform="translate(430 48)">
      <line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/>
    </g>
    <g stroke-opacity="0.5" stroke-width="2" transform="translate(650 72)">
      <line x1="-8" y1="0" x2="8" y2="0"/><line x1="0" y1="-8" x2="0" y2="8"/>
      <line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/>
    </g>
    <g stroke-opacity="0.3" stroke-width="2" transform="translate(870 120)">
      <line x1="-6" y1="0" x2="6" y2="0"/><line x1="0" y1="-6" x2="0" y2="6"/>
    </g>
    <g stroke-opacity="0.35" stroke-width="2" transform="translate(300 92)">
      <line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/>
    </g>
  </g>
</svg>
